# ═══════════════════════════════════════════════════════════════════════════
#  docker-compose.system2.yml  –  Run this on MACHINE 2 (the "client" side)
#
#  Starts:
#    • Python client-2 only
#      Connects to Machine 1's etcd and PostgreSQL over the LAN.
#
#  Before starting:
#    1. Copy .env.system2 to .env
#    2. Set SYSTEM1_IP= to Machine 1's LAN IP  (e.g. 192.168.1.10)
#       Run on Machine 1:  ipconfig  (Windows)  or  hostname -I  (Linux)
#
#  Copy these files from Machine 1 to Machine 2:
#    client.py  requirements.txt  Dockerfile.client  docker-compose.system2.yml  .env.system2→.env
#
#  Run:
#    docker compose -f docker-compose.system2.yml up --build -d
#    docker compose -f docker-compose.system2.yml logs -f
# ═══════════════════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ── Python client-2  (runs on System 2, connects to System 1 remotely) ───
  client-2:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: etcd-client-2
    environment:
      CLIENT_ID:    client-2
      # Point at Machine 1's LAN IP — set SYSTEM1_IP in your .env file
      ETCD_HOST:    "${SYSTEM1_IP}"
      ETCD_PORT:    "2379"
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@${SYSTEM1_IP}:5432/${POSTGRES_DB:-etcd_demo}
      LEASE_TTL:    "${LEASE_TTL:-15}"
    restart: unless-stopped
