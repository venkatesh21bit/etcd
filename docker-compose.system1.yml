# ═══════════════════════════════════════════════════════════════════════════
#  docker-compose.system1.yml  –  Run this on MACHINE 1 (the "server" side)
#
#  Starts:
#    • etcd 3-node cluster       → ports 2379, 2381, 2383
#    • PostgreSQL 16             → port 5432
#    • Python client-1           → writes to the DB as APPLICATION LEADER
#    • Flask visualiser          → http://MACHINE1_IP:8000
#
#  Before starting:
#    1. Copy .env.system1 to .env  (or export SYSTEM1_IP in your shell)
#    2. Make sure ports 2379, 5432, 8000 are open in your firewall
#
#  Run:
#    docker compose -f docker-compose.system1.yml up --build -d
#    docker compose -f docker-compose.system1.yml logs -f
# ═══════════════════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ── etcd 3-node cluster ────────────────────────────────────────────────────
  etcd-cluster:
    build:
      context: .
      dockerfile: Dockerfile.etcd
    container_name: etcd-cluster
    ports:
      - "2379:2379"   # node1 client port  ← Systems 2 & 3 connect here
      - "2381:2381"   # node2 client port
      - "2383:2383"   # node3 client port
    environment:
      # Machine 1's LAN IP — set SYSTEM1_IP in .env
      # Needed so remote clients get the correct advertise-client-url from etcd
      ADVERTISE_IP: "${SYSTEM1_IP:-127.0.0.1}"
    volumes:
      - etcd-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: etcd-postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB:       ${POSTGRES_DB:-etcd_demo}
    ports:
      - "5432:5432"   # ← System 2 connects here for DB writes
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Python client-1  (runs on System 1) ───────────────────────────────────
  client-1:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: etcd-client-1
    environment:
      CLIENT_ID:    client-1
      ETCD_HOST:    etcd-cluster      # internal docker hostname
      ETCD_PORT:    "2379"
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-etcd_demo}
      LEASE_TTL:    "${LEASE_TTL:-15}"
    depends_on:
      etcd-cluster:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Flask visualiser ───────────────────────────────────────────────────────
  visualiser:
    build:
      context: .
      dockerfile: Dockerfile.visualiser
    container_name: etcd-visualiser
    ports:
      - "8000:8000"   # open  http://MACHINE1_IP:8000  in any browser
    environment:
      LIVE_MODE:    "true"
      ETCD_HOST:    etcd-cluster      # internal docker hostname
      ETCD_PORT:    "2379"
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-etcd_demo}
      LEASE_TTL:    "${LEASE_TTL:-15}"
      PORT:         "8000"
    depends_on:
      etcd-cluster:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  etcd-data:
  pg-data:
